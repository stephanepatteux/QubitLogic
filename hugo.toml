baseURL = "https://qubitlogic.dev/"
locale = "en-gb"
title = "QubitLogic"
theme = "PaperMod"
enableRobotsTXT = true
enableGitInfo = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
paginate = 10

[minify]
  disableXML = true
  minifyOutput = true

# Impact click URL — paste from Impact → Brands → Coursera → Create a link
# Deep-link target (if building manually): coursera.org/learn/packt-beginners-guide-to-practical-quantum-computing-with-ibm-qiskit-w6mos
[params.affiliates]
  digitalocean = "https://www.awin1.com/cread.php?awinmid=123996&awinaffid=2917857&ued=https%3A%2F%2Fwww.digitalocean.com%2Fpricing"
  paperspace = "https://www.awin1.com/cread.php?awinmid=123996&awinaffid=2917857&ued=https%3A%2F%2Fwww.paperspace.com%2F"
  vultr = "https://www.vultr.com/?ref=9904429-9J"
  cursor = "https://cursor.com/referral?code=TKHKBWB8304Q"
  bright_data = "https://get.brightdata.com/4xmvog6ozily"
  bright_data_proxy = "https://get.brightdata.com/3evbu"
  coursera_ibm_quantum = ""
  # Apply: https://site.financialmodelingprep.com/affiliates — paste tracking URL when approved
  fmp = ""
  tradingview = "https://www.tradingview.com/?aff_id=157199"
  # Apply: https://www.dynadot.com/affiliate — Ambassador Program, 30% domain reg/transfer
  dynadot = ""
  # Apply: https://www.zoho.com/affiliate/ — 15-20% recurring for 12 months, 90-day cookie
  zoho = ""
  # Apply: https://www.jobscan.co/affiliates via ShareASale — 15% commission, 45-day cookie. Quantum job seekers need ATS optimisation.
  jobscan = ""
  # Apply: https://jooble.org/info/en/about-affiliate — CPC job aggregator, strong tech inventory, no minimum traffic requirement
  jooble = "https://jooble.org/jobs-quantum-computing"

[params]
  # Applied to every paid/affiliate outbound link (shortcodes + auto-detected markdown links).
  # Google: use rel="sponsored" for commission links; nofollow is recommended alongside.
  # See layouts/partials/affiliate/rel.html and url_is_affiliate.html
  affiliate_link_rel = "nofollow sponsored noopener"
  env = "production"
  title = "QubitLogic"
  tagline = "Quantum Developer Tools, AI Agent VPS Tutorials & Qiskit Code"
  description = "A technical workbench for Quantum-AI Hybrid Development. Code-first tutorials on Qiskit, cloud quantum developer tools, AI agent VPS hosting, Python infrastructure, and self-hosted stacks."
  keywords = ["quantum computing", "AI development", "Qiskit", "Python", "VPS", "self-hosted", "AI agents", "quantum machine learning"]
  author = "Stephane Patteux"
  images = ["/images/og/home.png"]

  # Dark mode default
  defaultTheme = "dark"
  disableThemeToggle = false

  # Reading experience
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowSeriesNavigation = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false

[params.schema]
  publisherType = "Organization"
  sameAs = [
    "https://github.com/stephanepatteux/QubitLogic",
    "https://dev.to/steph60220",
  ]

[params.label]
  text = ""
  icon = "/images/logo-mark.svg"
  iconHeight = 28

[params.homeInfoParams]
  Title = "QubitLogic"
  Content = "A technical workbench for Quantum-AI Hybrid Development. Free cloud quantum developer tools, AI agent VPS tutorials, benchmarks, code, and infrastructure for developers building at the frontier."

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/stephanepatteux/QubitLogic"

[[params.socialIcons]]
  name = "devto"
  title = "DEV Community"
  url = "https://dev.to/steph60220"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 2
  keys = ["title", "permalink", "summary", "content"]

# Google Search Console: paste verification tag here, or set GOOGLE_SITE_VERIFICATION
# env var / GitHub secret at build time (see deploy-notes.md).
[params.analytics.google]
  SiteVerificationTag = ""

[params.footer]
  text = '<a href="/about/">About</a> · <a href="/privacy/">Privacy</a> · <a href="/affiliate-disclosure/">Affiliate</a>'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true          # allow raw HTML in markdown (needed for shortcodes with HTML)
  [markup.highlight]
    noClasses = false        # use external CSS for syntax highlighting
    lineNos = true
    lineNumbersInTable = true
    style = "monokai"

[taxonomies]
  tag = "tags"
  series = "series"
  category = "categories"

[menu]
  [[menu.main]]
    identifier = "infrastructure"
    name = "Infrastructure"
    url = "/infrastructure/"
    weight = 10
  [[menu.main]]
    identifier = "quantum-coding"
    name = "Quantum Coding"
    url = "/quantum-coding/"
    weight = 20
  [[menu.main]]
    identifier = "professional-edge"
    name = "Professional Edge"
    url = "/professional-edge/"
    weight = 30
  [[menu.main]]
    identifier = "start-here"
    name = "Start Here"
    url = "/start-here/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 50

[[menu.footer]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 5

[[menu.footer]]
  identifier = "privacy"
  name = "Privacy Policy"
  url = "/privacy/"
  weight = 10

[[menu.footer]]
  identifier = "affiliate-disclosure"
  name = "Affiliate Disclosure"
  url = "/affiliate-disclosure/"
  weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]   # JSON required for client-side search

[services]
  [services.rss]
    limit = -1   # include all posts; layouts/rss.xml sorts by publish date

[privacy]
  [privacy.vimeo]
    disabled = false
    simple = true
  [privacy.x]
    disabled = false
    enableDNT = true
    simple = true
  [privacy.instagram]
    disabled = false
    simple = true
  [privacy.youtube]
    disabled = false
    privacyEnhanced = true

[security.funcs]
getenv = ['^HUGO_', '^CI$', '^GOOGLE_SITE_VERIFICATION$']
