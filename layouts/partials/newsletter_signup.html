{{/* Inline newsletter signup box — used on /newsletter/, start-here, toolkit pages */}}
<div class="ql-newsletter-box">
  <div class="ql-newsletter-inner">
    <div class="ql-newsletter-icon" aria-hidden="true">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <p class="ql-newsletter-title">Weekly digest for developers</p>
    <p class="ql-newsletter-sub">One article per week — quantum algorithms, AI infrastructure, and Python you can run. No hype.</p>

    <form id="ql-subscribe-form-inline" class="ql-subscribe-form" novalidate>
      {{/* Honeypot */}}
      <input type="text" name="website" tabindex="-1" aria-hidden="true"
             autocomplete="off" style="display:none!important">
      <div class="ql-subscribe-row">
        <input
          type="email" name="email" required
          placeholder="you@example.com"
          class="ql-subscribe-input"
          autocomplete="email"
          aria-label="Email address"
        >
        <button type="submit" class="ql-subscribe-btn">Subscribe</button>
      </div>
      <div class="ql-subscribe-msg" aria-live="polite" hidden></div>
    </form>

    <p class="ql-newsletter-note">Free · Unsubscribe any time · PQC checklist for new subscribers</p>
  </div>
</div>
