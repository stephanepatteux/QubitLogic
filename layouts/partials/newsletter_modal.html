{{/* Newsletter subscribe modal — shown once per visitor until dismissed */}}
<div id="ql-newsletter-modal" class="ql-modal" role="dialog" aria-modal="true" aria-labelledby="ql-modal-title" hidden>
  <div class="ql-modal-backdrop" data-ql-modal-close></div>
  <div class="ql-modal-panel">
    <button type="button" class="ql-modal-close" data-ql-modal-close aria-label="Close">×</button>
    <div class="ql-modal-form">
      <div class="ql-modal-icon" aria-hidden="true">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h2 id="ql-modal-title" class="ql-modal-title">Stay ahead of the quantum curve</h2>
      <p class="ql-modal-desc">One serious tutorial per week — runnable code, honest benchmarks, no fluff.</p>

      <form id="ql-subscribe-form-modal" class="ql-subscribe-form" novalidate>
        {{/* Honeypot — hidden from humans, bots fill it */}}
        <input type="text" name="website" tabindex="-1" aria-hidden="true"
               autocomplete="off" style="display:none!important">
        <div class="ql-subscribe-row">
          <input
            type="email" name="email" required
            placeholder="you@example.com"
            class="ql-subscribe-input"
            autocomplete="email"
            aria-label="Email address"
          >
          <button type="submit" class="ql-subscribe-btn">Subscribe</button>
        </div>
        <div class="ql-subscribe-msg" aria-live="polite" hidden></div>
      </form>

      <p class="ql-modal-note">Free. No spam. <a href="/newsletter/">Learn more</a></p>
      <button type="button" class="ql-modal-dismiss" data-ql-modal-close>No thanks</button>
    </div>
  </div>
</div>

<button type="button" id="ql-newsletter-fab" class="ql-newsletter-fab" aria-label="Subscribe to newsletter" title="Subscribe" hidden>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
    <polyline points="22,6 12,13 2,6"/>
  </svg>
  <span>Subscribe</span>
</button>
