{{- with .cxt }}
{{- if and (not $.IsSingle) (not $.isHidden) }}
{{- $coverImage := partial "cover-image-url.html" . }}
<figure class="entry-cover entry-cover--thumb">
  {{- $alt := (.Params.cover.alt | default .Title | plainify) }}
  <img loading="lazy" src="{{ $coverImage | absURL }}" alt="{{ $alt }}" width="96" height="96">
</figure>
{{- end }}
{{- end }}
