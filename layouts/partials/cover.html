{{- with .cxt }}
{{- $coverImage := partial "cover-image-url.html" . }}
{{- if (and $coverImage (not $.isHidden)) }}
<figure class="entry-cover">
  {{- $loading := cond $.IsSingle "eager" "lazy" }}
  {{- $alt := (.Params.cover.alt | default .Title | plainify) }}
  <img loading="{{ $loading }}" src="{{ $coverImage | absURL }}" alt="{{ $alt }}" width="1200" height="630">
</figure>
{{- end }}
{{- end }}
