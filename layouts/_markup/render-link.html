{{- $dest := .Destination -}}
{{- $isAffiliate := partial "affiliate/url_is_affiliate.html" $dest -}}

<a href="{{ $dest | safeURL }}"
  {{- if $isAffiliate }}{{ partial "affiliate/outbound_attrs.html" . | safeHTMLAttr }}{{- end -}}
  {{- with .Title }} title="{{ . }}"{{- end -}}
>{{ .Text | safeHTML }}</a>
