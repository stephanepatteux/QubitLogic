name: Newsletter

# Tuesday 09:00 UTC = backup send if Monday deploy missed the window.
# Primary path: deploy.yml / scheduled-deploy.yml call scripts/vps-newsletter-send.sh after each deploy.
on:
  schedule:
    - cron: "0 9 * * 2"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run      # parse RSS + log what would happen, no emails
          - test-send    # send one email to test_email address
          - send         # normal send (skips if post already sent)
          - force-send   # resend even if post was already sent
          - setup-api    # one-time: install systemd service + patch Nginx
      test_email:
        description: "Email for test-send mode"
        required: false
        default: "stephanepatteux@gmail.com"

jobs:
  newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H 51.195.86.197 >> ~/.ssh/known_hosts

      - name: Sync newsletter scripts to VPS
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'setup-api')
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@51.195.86.197 \
            'sudo mkdir -p /opt/qubitlogic/newsletter /var/lib/qubitlogic && sudo chown -R ubuntu:ubuntu /opt/qubitlogic /var/lib/qubitlogic'
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" newsletter/ \
            ubuntu@51.195.86.197:/opt/qubitlogic/newsletter/

      - name: Write newsletter .env on VPS
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode != 'setup-api')
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@51.195.86.197 "python3 - '$SMTP_PASSWORD'" <<'PYEOF'
          import os, sys
          password = sys.argv[1]
          env = [
            "NEWSLETTER_DB=/var/lib/qubitlogic/newsletter.db",
            "NEWSLETTER_STATE=/var/lib/qubitlogic/last_sent_guid.txt",
            "SITE_URL=https://qubitlogic.dev",
            "RSS_URL=https://qubitlogic.dev/index.xml",
            'EMAIL_FROM="QubitLogic <hello@qubitlogic.dev>"',
            "SMTP_HOST=smtppro.zoho.eu",
            "SMTP_PORT=587",
            "SMTP_USER=hello@qubitlogic.dev",
            f"SMTP_PASSWORD={password}",
          ]
          path = "/opt/qubitlogic/newsletter/.env"
          with open(path, "w") as f:
            f.write("\n".join(env) + "\n")
          os.chmod(path, 0o600)
          print(f"Wrote {path}")
          PYEOF

      - name: "Mode: dry-run"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'dry-run'
        run: |
          ssh ubuntu@51.195.86.197 'bash -s' <<'RUN'
          set -a; source /opt/qubitlogic/newsletter/.env; set +a
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/send.py --dry-run
          RUN

      - name: "Mode: test-send"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test-send'
        run: |
          EMAIL="${{ github.event.inputs.test_email }}"
          ssh ubuntu@51.195.86.197 "bash -s '$EMAIL'" <<'RUN'
          set -a; source /opt/qubitlogic/newsletter/.env; set +a
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/test_send.py "$1"
          RUN

      - name: "Mode: force-send"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'force-send'
        run: |
          ssh ubuntu@51.195.86.197 'bash -s' <<'RUN'
          set -a; source /opt/qubitlogic/newsletter/.env; set +a
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/seed_subscriber.py stephanepatteux@gmail.com
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/send.py --force
          RUN

      - name: "Mode: setup-api"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'setup-api'
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" newsletter/ \
            ubuntu@51.195.86.197:/opt/qubitlogic/newsletter/
          ssh ubuntu@51.195.86.197 \
            "SMTP_PASSWORD='$SMTP_PASSWORD' bash /opt/qubitlogic/newsletter/setup_api.sh"

      # Scheduled Tuesday run + manual "send" mode
      - name: "Mode: send"
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'send')
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: bash scripts/vps-newsletter-send.sh
