name: Newsletter

# Tuesday 09:00 UTC = 10:00 BST (Apr-Oct) / 09:00 GMT (Nov-Mar)
on:
  schedule:
    - cron: "0 9 * * 2"

  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run      # parse RSS + log what would happen, no emails
          - test-send    # send one email to test_email address
          - send         # normal send (skips if post already sent)
          - force-send   # resend even if post was already sent
          - setup-api    # one-time: install systemd service + patch Nginx
      test_email:
        description: "Email for test-send mode"
        required: false
        default: "stephanepatteux@gmail.com"

jobs:
  newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H 51.195.86.197 >> ~/.ssh/known_hosts

      # ── Setup: venv + env file (idempotent) ──────────────────────────────────
      - name: Setup newsletter on VPS
        env:
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          # Create dirs and venv
          ssh ubuntu@51.195.86.197 'bash -s' <<'SETUP'
          set -e
          sudo mkdir -p /opt/qubitlogic/newsletter /var/lib/qubitlogic
          sudo chown -R ubuntu:ubuntu /opt/qubitlogic /var/lib/qubitlogic
          if [ ! -f /opt/qubitlogic/newsletter/venv/bin/python ]; then
            python3 -m venv /opt/qubitlogic/newsletter/venv
          fi
          /opt/qubitlogic/newsletter/venv/bin/pip install --quiet --upgrade \
            fastapi "uvicorn[standard]" python-multipart 2>/dev/null
          SETUP

          # Write env file (no sudo needed – ubuntu owns /opt/qubitlogic)
          ssh ubuntu@51.195.86.197 "python3 - '$SMTP_PASSWORD'" <<'PYEOF'
          import sys, os
          password = sys.argv[1]
          env = [
            "NEWSLETTER_DB=/var/lib/qubitlogic/newsletter.db",
            "NEWSLETTER_STATE=/var/lib/qubitlogic/last_sent_guid.txt",
            "SITE_URL=https://qubitlogic.dev",
            "RSS_URL=https://qubitlogic.dev/index.xml",
            'EMAIL_FROM="QubitLogic <hello@qubitlogic.dev>"',
            "SMTP_HOST=smtppro.zoho.eu",
            "SMTP_PORT=587",
            "SMTP_USER=hello@qubitlogic.dev",
            f"SMTP_PASSWORD={password}",
          ]
          path = "/opt/qubitlogic/newsletter/.env"
          with open(path, "w") as f:
            f.write("\n".join(env) + "\n")
          os.chmod(path, 0o600)
          print(f"Wrote {path}")
          PYEOF

      # ── Modes ────────────────────────────────────────────────────────────────

      - name: "Mode: dry-run"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'dry-run'
        run: |
          ssh ubuntu@51.195.86.197 'bash -s' <<'RUN'
          set -a; source /opt/qubitlogic/newsletter/.env; set +a
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/send.py --dry-run
          RUN

      - name: "Mode: test-send"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'test-send'
        run: |
          EMAIL="${{ github.event.inputs.test_email }}"
          ssh ubuntu@51.195.86.197 "bash -s '$EMAIL'" <<'RUN'
          set -a; source /opt/qubitlogic/newsletter/.env; set +a
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/test_send.py "$1"
          RUN

      - name: "Mode: force-send"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'force-send'
        run: |
          ssh ubuntu@51.195.86.197 'bash -s' <<'RUN'
          set -a; source /opt/qubitlogic/newsletter/.env; set +a
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/send.py --force
          RUN

      # One-time API service + Nginx setup
      - name: "Mode: setup-api"
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'setup-api'
        run: |
          ssh ubuntu@51.195.86.197 'bash -s' <<'RUN'
          set -e

          # Kill anything on port 8001 (zombie processes from failed restarts)
          sudo fuser -k 8001/tcp 2>/dev/null || true
          sleep 1

          # Install systemd service
          sudo cp /opt/qubitlogic/newsletter/qubitlogic-newsletter.service \
            /etc/systemd/system/qubitlogic-newsletter.service
          sudo systemctl daemon-reload
          sudo systemctl enable qubitlogic-newsletter
          sudo systemctl restart qubitlogic-newsletter
          sleep 3
          if sudo systemctl is-active --quiet qubitlogic-newsletter; then
            echo "Service: running"
          else
            echo "Service: FAILED — journalctl output:"
            sudo journalctl -xeu qubitlogic-newsletter --no-pager -n 40
            exit 1
          fi

          # Patch Nginx — add /api/newsletter/ block if not already present
          NGINX_CONF=/etc/nginx/sites-available/qubitlogic
          if grep -q "api/newsletter" "$NGINX_CONF"; then
            echo "Nginx: /api/newsletter/ block already present — skipping"
          else
            # Insert before the closing } of the server block
            sudo sed -i 's|^}$|    # Newsletter API\n    location /api/newsletter/ {\n        proxy_pass         http://127.0.0.1:8001/api/newsletter/;\n        proxy_set_header   Host              $host;\n        proxy_set_header   X-Real-IP         $remote_addr;\n        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;\n        proxy_set_header   X-Forwarded-Proto $scheme;\n        proxy_read_timeout 10s;\n    }\n}|' "$NGINX_CONF"
            sudo nginx -t && sudo systemctl reload nginx && echo "Nginx: reloaded with /api/newsletter/ block"
          fi

          # Quick health check
          curl -sf http://127.0.0.1:8001/api/newsletter/health && echo "API health: OK" || echo "API health: FAILED"

          # Seed owner subscriber (confirmed) for weekly send testing
          /opt/qubitlogic/newsletter/venv/bin/python /opt/qubitlogic/newsletter/seed_subscriber.py \
            stephanepatteux@gmail.com || true
          RUN

      # Scheduled run + manual "send" mode
      - name: "Mode: send"
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'send')
        run: |
          ssh ubuntu@51.195.86.197 'bash -s' <<'RUN'
          set -a; source /opt/qubitlogic/newsletter/.env; set +a
          /opt/qubitlogic/newsletter/venv/bin/python \
            /opt/qubitlogic/newsletter/send.py
          RUN
