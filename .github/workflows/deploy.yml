name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.162.1'
          extended: true

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate post cover images
        run: python3 scripts/generate_cover_images.py

      - name: Generate OG social preview images
        run: python3 scripts/generate_og_images.py

      - name: Build
        env:
          GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
        run: hugo --minify

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H 51.195.86.197 >> ~/.ssh/known_hosts

      - name: Deploy site to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            public/ \
            ubuntu@51.195.86.197:/var/www/qubitlogic/

      - name: Deploy newsletter scripts to VPS
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@51.195.86.197 \
            "sudo mkdir -p /opt/qubitlogic/newsletter /var/lib/qubitlogic && sudo chown -R ubuntu:ubuntu /opt/qubitlogic /var/lib/qubitlogic"
          rsync -avz \
            -e "ssh -o StrictHostKeyChecking=no" \
            newsletter/ \
            ubuntu@51.195.86.197:/opt/qubitlogic/newsletter/
