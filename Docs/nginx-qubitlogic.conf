server {
    listen 80;
    server_name qubitlogic.dev www.qubitlogic.dev;

    root /var/www/qubitlogic;
    index index.html;

    # Hide Nginx version from Server header
    server_tokens off;

    # Charset
    charset utf-8;

    # Hugo clean URLs
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Static asset caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS: tell browsers to use HTTPS for 1 year (includeSubDomains + preload)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP: fonts and images are self-hosted; inline scripts required for cookie
    # banner, reading-progress bar, and newsletter modal in extend_footer.html.
    # Tighten to nonce-based if those scripts are ever moved to external files.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" always;

    # Disable unused browser APIs
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Prevent cross-origin window.opener attacks
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml font/woff2;
    gzip_min_length 1024;
}
