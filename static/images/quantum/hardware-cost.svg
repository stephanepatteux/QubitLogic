<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-label="Quantum computer hardware cost breakdown">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f14"/>
      <stop offset="100%" stop-color="#131318"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00e87a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00e87a" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="bar5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <rect width="760" height="300" fill="url(#bg2)" rx="12"/>
  <rect width="760" height="300" fill="none" stroke="#2c2c36" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="30" y="36" fill="#e4e4ec" font-family="system-ui,sans-serif" font-size="14" font-weight="700">Cost to Build a Quantum Computer (2026)</text>
  <text x="30" y="54" fill="#55556a" font-family="system-ui,sans-serif" font-size="11">Superconducting system. Enterprise-grade (500+ qubits).</text>

  <!-- Axis line -->
  <line x1="30" y1="262" x2="740" y2="262" stroke="#2c2c36" stroke-width="1"/>

  <!-- Scale labels -->
  <text x="30" y="278" fill="#55556a" font-family="ui-monospace,monospace" font-size="10">$0</text>
  <text x="195" y="278" fill="#55556a" font-family="ui-monospace,monospace" font-size="10">$2.5M</text>
  <text x="360" y="278" fill="#55556a" font-family="ui-monospace,monospace" font-size="10">$5M</text>
  <text x="525" y="278" fill="#55556a" font-family="ui-monospace,monospace" font-size="10">$7.5M</text>
  <text x="690" y="278" fill="#55556a" font-family="ui-monospace,monospace" font-size="10">$10M</text>
  <!-- Vertical scale ticks -->
  <line x1="195" y1="60" x2="195" y2="262" stroke="#2c2c36" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="360" y1="60" x2="360" y2="262" stroke="#2c2c36" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="525" y1="60" x2="525" y2="262" stroke="#2c2c36" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="690" y1="60" x2="690" y2="262" stroke="#2c2c36" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Scale: $10M = 700px wide (30 to 730), so $1M = 70px -->

  <!-- Row 1: Dilution refrigerator $0.7M$10M -->
  <text x="30" y="88" fill="#e4e4ec" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Dilution Refrigerator</text>
  <text x="30" y="102" fill="#55556a" font-family="system-ui,sans-serif" font-size="10">Bluefors KIDE (enterprise)  the heart of the machine</text>
  <!-- Range bar: $0.7M to $10M = x=79 to x=730 -->
  <rect x="79" y="108" width="651" height="18" rx="4" fill="url(#bar1)" fill-opacity="0.25"/>
  <rect x="79" y="108" width="651" height="18" rx="4" fill="none" stroke="#00e87a" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="79" y="108" width="441" height="18" rx="4" fill="url(#bar1)"/>
  <text x="84" y="121" fill="#0c0c0f" font-family="ui-monospace,monospace" font-size="10" font-weight="700">$0.7M</text>
  <text x="692" y="121" fill="#00e87a" font-family="ui-monospace,monospace" font-size="10" font-weight="700">up to $10M</text>

  <!-- Row 2: Control electronics $3M$5M -->
  <text x="30" y="148" fill="#e4e4ec" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Control Electronics</text>
  <text x="30" y="162" fill="#55556a" font-family="system-ui,sans-serif" font-size="10">Microwave systems, FPGAs, signal generation</text>
  <!-- $3M to $5M = x=240 to x=380 -->
  <rect x="240" y="168" width="350" height="18" rx="4" fill="url(#bar2)" fill-opacity="0.25"/>
  <rect x="240" y="168" width="350" height="18" rx="4" fill="none" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
  <rect x="240" y="168" width="210" height="18" rx="4" fill="url(#bar2)"/>
  <text x="245" y="181" fill="#0c0c0f" font-family="ui-monospace,monospace" font-size="10" font-weight="700">$3M</text>
  <text x="555" y="181" fill="#38bdf8" font-family="ui-monospace,monospace" font-size="10" font-weight="700">up to $5M</text>

  <!-- Row 3: Facility $0.2M$0.4M -->
  <text x="30" y="208" fill="#e4e4ec" font-family="system-ui,sans-serif" font-size="11" font-weight="600">Facility Prep</text>
  <text x="30" y="222" fill="#55556a" font-family="system-ui,sans-serif" font-size="10">EMI shielding, vibration isolation, chilled water, power</text>
  <!-- $0.2M to $0.4M = x=44 to x=58 -->
  <rect x="44" y="228" width="28" height="18" rx="3" fill="url(#bar3)" fill-opacity="0.3"/>
  <rect x="44" y="228" width="28" height="18" rx="3" fill="none" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="44" y="228" width="14" height="18" rx="3" fill="url(#bar3)"/>
  <text x="76" y="241" fill="#a78bfa" font-family="ui-monospace,monospace" font-size="10" font-weight="600">$200K  $400K</text>

  <!-- Cloud access note -->
  <rect x="520" y="200" width="220" height="52" rx="6" fill="#00e87a" fill-opacity="0.07" stroke="#00e87a" stroke-width="1" stroke-opacity="0.3"/>
  <text x="630" y="218" text-anchor="middle" fill="#00e87a" font-family="system-ui,sans-serif" font-size="10" font-weight="700"> Cloud Alternative</text>
  <text x="630" y="232" text-anchor="middle" fill="#8888a0" font-family="system-ui,sans-serif" font-size="10">Free tier (IBM) ’ $50K/mo</text>
  <text x="630" y="246" text-anchor="middle" fill="#8888a0" font-family="system-ui,sans-serif" font-size="10">No hardware ownership</text>
</svg>
